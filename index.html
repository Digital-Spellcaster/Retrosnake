<!DOCTYPE html>
<!--
================================================================================
  RETRO SNAKE — Pixel Art Edition
  A single-file, offline-ready HTML5 arcade game. Open source: free to play,
  study, fork, and build on — no permission or attribution required.

  WHY ONE FILE?
  Everything (HTML structure, CSS, and all game logic) lives in this single
  document so you can drop it anywhere — open it locally, host it static, or
  wrap it with Capacitor/Cordova for mobile. No build step, no dependencies,
  no network calls. Sound is synthesized in code via the Web Audio API, so
  there are no asset files to ship or license.

  HOW THIS FILE IS ORGANIZED (search for "SECTION:" to jump between parts)
    1. <head><style> ............ all visual styling, grouped by area
    2. <body> .................... the game DOM (HUD, screen/canvas, D-pad, menus)
    3. <script> (main) ........... the whole game, split into labelled SECTIONS:
         - Config & Constants ..... grid size, difficulty, themes, skins, colors
         - DOM References ......... cached element lookups
         - Audio Engine ........... synthesized sound effects (Web Audio)
         - Layout & Canvas/DPR .... scaling + high-DPI-correct canvas sizing
         - Rendering .............. draws each frame (snake uses an offscreen canvas)
         - Game Loop .............. fixed-timestep update + render
         - Snake / Input .......... movement, direction queue, swipe + D-pad
         - Collisions ............. walls (or wrap), self, obstacles
         - Food / Coins / Power-ups
         - Obstacles
         - Scoring & Combo
         - Settings ............... each toggle/cycle + localStorage persistence
         - High Scores / Unlocks / Lifetime Stats
         - Celebration / Pause
         - Menus & Messages ....... settings menu, About, Help, popups
         - Game Setup ............. initGame / startGame / triggerGameOver
         - Bootstrap (window.onload)
    4. <script> blocks (small) ... reduced-motion flag + a few safety shims

  EASY THINGS TO CUSTOMIZE
    - Add a color theme:  push an entry onto the `gameThemes` array.
    - Add a snake skin:   push an entry onto the `snakeSkins` array.
    - Change the board:   `gridSize`, `tileCountX`, `tileCountY` constants.
    - Retune sounds:      the play*Sound() helpers in the Audio Engine section.
    - Change difficulty:  the `difficultySettings` object.

  Built across a year of learning to code with AI. If it helps you enjoy
  making things, it's done its job. Have fun. — the Digital Spellcaster
================================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Snake - Pixel Art Style (Offline Ready)</title>
    <style>
        /* FONT NOTE:
        This game uses the font stack: 'VT323', 'Courier New', Courier, monospace.
        No custom webfont is bundled, so it renders with the system monospace fallback (clean and retro).
        To use a true pixel webfont OFFLINE (e.g. VT323 or 'Press Start 2P'):
          1. Place the font file (e.g. VT323-Regular.woff2) in the same folder as this HTML.
          2. Add an @font-face rule here, for example:
             @font-face { font-family: 'VT323'; src: url('VT323-Regular.woff2') format('woff2'); font-display: swap; }
          3. The existing font-family declarations will pick it up automatically.
        */
        

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ============================================================
           STYLES: Page & Layout
           Full-screen container that centers and scales the phone to fit.
           ============================================================ */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'VT323', 'Courier New', Courier, monospace;
            color: #c7f0d8;
            touch-action: manipulation;
            font-size: 15px;
        }
        
        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, border-radius 0.3s ease;
        }

        .game-wrapper {
            background-color: #4a5850;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Positioned for scaling */
            transform-origin: center center;
            transition: background-color 0.3s ease;
            position: relative; /* For settings menu positioning */
        }

        #settings-icon:active, #start-restart-button:active {
            color: #a8c0b0;
            transform: scale(0.95); /* Maintained active press effect */
        }

        /* ============================================================
           STYLES: Game Screen & Canvas
           The play area; #game-canvas is sized for crisp high-DPI rendering.
           ============================================================ */
        .screen-border {
            position: relative;
            background-color: #333;
            padding: 10px;
            border-radius: 5px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            margin-top: 5px;
            max-width: 100%;
        }

        #game-canvas {
            border: 2px solid #000000;
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
        }
        
        .info-display-container {
            width: 100%;
            max-width: 400px; /* Will be adjusted by JS to canvas width */
            margin-bottom: 15px;
            padding: 0 5px;
            color: #1e2d24;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 14px;
            transition: color 0.3s ease;
            margin-top: 10px;
        }

        .info-left-column, .info-right-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-left-column {
            align-items: flex-start;
        }
        .info-right-column {
            align-items: flex-end;
        }
        
        /* ============================================================
           STYLES: HUD — score, coins, combo
           The neon readouts above the screen.
           ============================================================ */
        #score-display {
            font-size: 24px;
            transition: all 0.15s ease-in-out; /* For flashing effect */
            white-space: nowrap; /* Prevent score from wrapping */
        }
        .score-flash {
            color: gold !important; /* Use important to override other styles */
            text-shadow: 0 0 8px gold;
            transform: scale(1.1);
        }

        .electric-text {
            color: #7DF9FF !important; /* Use important to override other styles */
            text-shadow: 0 0 2px #00BFFF, 0 0 5px #00BFFF, 0 0 10px #00BFFF, 0 0 15px #00BFFF !important;
        }
        
        .gold-text {
            color: gold;
            text-shadow: 0 0 5px gold;
        }

        #coin-status-display, #powerup-status-display {
            font-size: 16px;
            min-height: 1.2em;
            white-space: nowrap;
            transition: color 0.3s, text-shadow 0.3s;
        }

        #combo-status-display {
            font-size: 16px;
            min-height: 1.2em;
            white-space: nowrap;
            transition: opacity 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 5px gold;
            opacity: 0;
            transform: translateY(-5px);
        }
        #combo-status-display.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #message-box p, #message-box li {
            font-family: 'VT323', 'Courier New', Courier, monospace;
        }

        #message-box h3 {
            font-size: 24px;
        }
        #message-box p {
            font-size: 16px;
        }
         #message-box li {
            font-size: 15px;
        }


        /* ============================================================
           STYLES: D-Pad & Controls
           Direction pad, plus the gear (settings) and play/pause buttons.
           ============================================================ */
        #bottom-bar {
            position: static;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            width: 300px;
            height: 300px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .control-button {
            font-family: 'VT323', 'Courier New', Courier, monospace;
            color: #333;
            border-width: 1px;
            border-style: solid;
            border-color: #bbb #999 #777 #aaa;
            border-radius: 12px;
            font-size: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* CSS FIXES: Enforce no selection and transparent tap highlight */
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            pointer-events: auto !important;
            transition: background 0.15s, transform 0.05s, box-shadow 0.15s, border-color 0.15s, color 0.15s, text-shadow 0.15s;
            background: linear-gradient(to bottom, #f0f0f0 0%, #d8d8d8 30%, #c0c0c0 60%, #b0b0b0 100%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.25),
                        inset 0 1px 1px rgba(255,255,255,0.6),
                        inset 0 -2px 2px rgba(0,0,0,0.1);
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .control-button.control-glow {
            box-shadow: 0 0 15px 5px rgba(50, 150, 255, 0.7), inset 0 0 10px rgba(50, 150, 255, 0.5);
            color: #d0e0ff;
            transform: scale(0.95);
        }

        /* --- Brushed Aluminum --- */
        .control-button.brushed-aluminum {
            background: linear-gradient(to bottom, #e8e8e8 0%, #d8d8d8 40%, #c8c8c8 100%);
            border-color: #b0b0b0 #a0a0a0 #888888 #b0b0b0;
            color: #2c3e50;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            box-shadow: 0 3px 5px rgba(0,0,0,0.2),
                        inset 0 1px 1px rgba(255,255,255,0.7),
                        inset 0 -1px 1px rgba(0,0,0,0.1);
        }

        /* --- Brushed Bronze --- */
        .control-button.brushed-bronze {
            background: linear-gradient(to bottom, #d9ae77 0%, #c89858 40%, #b58240 100%);
            border-color: #a57230 #906020 #785018 #a57230;
            color: #4a300f;
            text-shadow: 0 1px 0 rgba(255,220,180,0.3);
            box-shadow: 0 3px 5px rgba(50,20,0,0.2),
                        inset 0 1px 1px rgba(255,230,200,0.7),
                        inset 0 -1px 1px rgba(50,20,0,0.1);
        }

        /* --- Anodized Aluminum (Dark/Matte) --- */
        .control-button.anodized-aluminum {
            background: linear-gradient(to bottom, #505058 0%, #404048 40%, #303038 100%);
            border-color: #282828 #181818 #080808 #282828;
            color: #e0e0e0;
            text-shadow: 0 1px 0 rgba(0,0,0,0.3);
            box-shadow: 0 3px 5px rgba(0,0,0,0.3),
                        inset 0 1px 0px rgba(100,100,100,0.3),
                        inset 0 -1px 1px rgba(0,0,0,0.2);
        }


        #up-button    { grid-column: 2; grid-row: 1; }
        #left-button  { grid-column: 1; grid-row: 2; }
        #right-button { grid-column: 3; grid-row: 2; }
        #down-button  { grid-column: 2; grid-row: 3; }
        .empty-cell-1 { grid-column: 1; grid-row: 1; visibility: hidden; }
        .empty-cell-2 { grid-column: 3; grid-row: 1; visibility: hidden; }
        .empty-cell-3 { grid-column: 1; grid-row: 3; visibility: hidden; }
        .empty-cell-4 { grid-column: 3; grid-row: 3; visibility: hidden; }
        .center-cell  { grid-column: 2; grid-row: 2; visibility: hidden; }

        /* ============================================================
           STYLES: Settings Menu & Buttons
           Basic options are visible; the rest sit under the Advanced expander.
           ============================================================ */
        #settings-menu {
            position: absolute; /* 'top' is now set dynamically by JavaScript */
            left: 50%;
            transform: translateX(-50%); /* Only center horizontally */
            background-color: rgba(40, 50, 45, 0.98);
            color: #c7f0d8;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #2c3e50;
            z-index: 120;
            display: none; /* Initially hidden */
            flex-direction: column;
            align-items: center;
            gap: 6px; /* MODIFIED */
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            overflow-y: auto; /* Allow scrolling for many options */
        }

        .settings-button {
            font-family: 'VT323', 'Courier New', Courier, monospace;
            color: white;
            border: 1px solid rgba(0,0,0,0.2);
            padding: 6px 15px;      /* MODIFIED */
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            transition: background-color 0.15s, transform 0.1s, box-shadow 0.15s, color 0.2s, text-shadow 0.2s;
            margin-bottom: 6px;     /* MODIFIED */
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
            background-color: #566573;
            box-shadow: 0 3px #3d4a55, 0 4px 6px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .settings-button:last-child {
            margin-bottom: 0;
        }
        .settings-button:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
         .settings-button.locked {
            color: #888;
            background-color: #444;
            cursor: not-allowed;
            box-shadow: 0 3px #222;
        }
        .settings-button.locked:active {
            transform: translateY(0) scale(1);
            box-shadow: 0 3px #222;
        }
        
        /* QA FIX: Removed green background from active-setting */
        .settings-button.active-setting {
             /* No special background, inherits from .settings-button */
        }
        .settings-button.active-setting:active {
            /* Keep a subtle active press effect if needed */
            transform: translateY(1px) scale(0.98);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        /* QA FIX: Replaced green background with a neutral style + highlight for 'Easy' */
        #cycle-difficulty-button.difficulty-easy { 
            background-color: #566573; /* Neutral color */
        }
        #cycle-difficulty-button.difficulty-easy:active { 
            background-color: #6c7a89;
            box-shadow: 0 2px #3d4a55, inset 0 1px 3px rgba(0,0,0,0.3);
        }
        #cycle-difficulty-button.difficulty-normal { background-color: #566573;
            box-shadow: 0 3px #3d4a55, 0 4px 6px rgba(0,0,0,0.15);}
        #cycle-difficulty-button.difficulty-normal:active { background-color: #6c7a89;
            box-shadow: 0 2px #3d4a55, inset 0 1px 3px rgba(0,0,0,0.3);}
        #cycle-difficulty-button.difficulty-hard { background-color: #566573;
            box-shadow: 0 3px #3d4a55, 0 4px 6px rgba(0,0,0,0.15);}
        #cycle-difficulty-button.difficulty-hard:active { background-color: #6c7a89;
            box-shadow: 0 2px #3d4a55, inset 0 1px 3px rgba(0,0,0,0.3);}
        #cycle-difficulty-button.difficulty-very-hard {
            background-color: #566573; /* Same red as Hard */
            box-shadow: 0 3px #3d4a55, 0 4px 6px rgba(0,0,0,0.15);
            color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        #cycle-difficulty-button.difficulty-very-hard:active {
            background-color: #6c7a89;
            box-shadow: 0 2px #3d4a55, inset 0 1px 3px rgba(0,0,0,0.3);
            color: white;
        }

        #settings-menu h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #ecf0f1;
            text-decoration: none; /* QA FIX: No underline */
            text-shadow: 0 0 2px #00BFFF, 0 0 5px #00BFFF, 0 0 10px #00BFFF, 0 0 15px #00BFFF; /* QA FIX: Neon blue glow */
            text-align: center;
        }
        
        .settings-button.electric-text {
            color: #7DF9FF !important; /* Use important to override other styles */
            text-shadow: 0 0 2px #00BFFF, 0 0 5px #00BFFF, 0 0 10px #00BFFF, 0 0 15px #00BFFF !important;
        }

        .settings-button.battery-low { color: #2ecc71; }
        .settings-button.battery-medium { color: #f1c40f; }
        .settings-button.battery-high { color: #e67e22; }
        .settings-button.battery-extreme { color: #c0392b; }
        .settings-button.battery-ultimate-plus { color: #9b59b6; } /* Purple for Ultimate+ */
        
        .settings-button.battery-high, .settings-button.electric-text {
             /* QA FIX: The .electric-text class handles the neon blue glow */
        }
        #cycle-graphics-mode-button.battery-extreme, #cycle-graphics-mode-button.battery-high, #toggle-obstacles-button.electric-text, #cycle-graphics-mode-button.battery-ultimate-plus {
             background-color: #566573; /* Ensure consistency */
             box-shadow: 0 3px #3d4a55, 0 4px 6px rgba(0,0,0,0.15);
             color: #7DF9FF !important;
             text-shadow: 0 0 2px #00BFFF, 0 0 5px #00BFFF, 0 0 10px #00BFFF, 0 0 15px #00BFFF !important;
        }
        
        #menu-unlocks-high-scores-button, #menu-about-button, #menu-help-button {
             background-color: #3498db;
             box-shadow: 0 3px #2980b9, 0 4px 6px rgba(0,0,0,0.15);
        }
         #menu-unlocks-high-scores-button:active, #menu-about-button:active, #menu-help-button:active {
             background-color: #2980b9;
             box-shadow: 0 2px #2980b9, inset 0 1px 3px rgba(0,0,0,0.3);
        }

        #save-and-play-button {
            background-color: #27ae60;
            box-shadow: 0 3px #1e8449, 0 4px 6px rgba(0,0,0,0.15);
            margin-top: 12px;
        }
        #save-and-play-button:active { background-color: #2ecc71;
            box-shadow: 0 2px #1e8449, inset 0 1px 3px rgba(0,0,0,0.3); }

        #menu-exit-game-button {
            background-color: #d35400;
            box-shadow: 0 3px #a04000, 0 4px 6px rgba(0,0,0,0.15);
            margin-top: 8px;
        }
        #menu-exit-game-button:active { background-color: #a04000;
            box-shadow: 0 2px #a04000, inset 0 1px 3px rgba(0,0,0,0.3);}

        /* Message Box Styling */
        /* ============================================================
           STYLES: Popups — About / Help / Game Over
           Shared modal used for all in-game messages.
           ============================================================ */
        #message-box {
            position: absolute;
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 26, 0.95);
            color: #e0e0e0;
            padding: 25px 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 130; /* Higher than settings menu */
            display: none; /* Initially hidden */
            border: 2px solid #505050;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            max-height: 80vh;
            overflow-y: auto;
        }
        #message-box h3 {
            font-size: 20px;
            margin-bottom: 18px;
            color: #f0c040;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #message-box p {
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.8;
            color: #b0b0b0;
        }
        #message-box ul { list-style-position: inside;
            padding-left: 0; margin-bottom: 20px; text-align: left;}
        #message-box li { font-size: 13px; margin-bottom: 10px;
            line-height: 1.6;}

        .about-content .version-text {
            font-size: 13px;
            color: #999; margin-top: 5px; margin-bottom: 2px;
            cursor: pointer; user-select: none; -webkit-user-select: none; display: block;
        }
         .about-content .code-lines-text { font-size: 9px; color: #777; margin-bottom: 10px; display: block;
         }
        .about-content .credits-text { font-size: 12px; color: #a0a0a0; line-height: 1.6;
        }
        .about-content .credits-text strong { color: #c0c0c0;
        }
        .about-content .separator, .help-content .separator, .unlock-separator, .high-score-separator {
            border-top: 1px dashed #444;
            margin: 15px auto; width: 70%;
        }
        .unlocks-section { margin-top: 15px; text-align: left;
        }
        .unlocks-section h4 { font-size: 14px; color: #e0e0e0; margin-bottom: 10px; text-decoration: underline;
        }
        .unlocks-section ul { list-style-type: none; padding-left: 0;
        }
        .unlocks-section li { font-size: 11px; margin-bottom: 6px; color: #b0b0b0;
        }
        .unlocks-section li.unlocked { color: #2ecc71;
        }
        .unlocks-section li.locked { color: #c0392b;
        }
        .unlocks-section li .item-name { font-weight: bold;
        }
        .unlocks-section li .item-status { margin-left: 5px;
        }

        #message-box button {
            font-family: 'VT323', 'Courier New', Courier, monospace;
            background-color: #c0392b;
            color: white;
            border: 1px solid #7b241c;
            padding: 12px 22px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px #922b21, 0 4px 6px rgba(0,0,0,0.2);
            margin-top: 25px;
            transition: background-color 0.1s, transform 0.1s;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        #message-box button:active {
            background-color: #922b21;
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 2px #922b21, inset 0 1px 2px rgba(0,0,0,0.3);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .controls-container { width: 260px;
                height: 260px; }
            .control-button { font-size: 34px; border-radius: 8px;
            }
        }
    </style>



<style>
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001s !important;
    animation-iteration-count: 1 !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
  .game-container, .game-wrapper, #score-display, #combo-status-display, .control-button {
    transition: none !important;
    transform: none !important;
  }
}
</style>

<style id="enhanced-styles">
/* --- Large Fonts (accessibility) --- */
body.large-fonts #score-display { font-size: 30px; }
body.large-fonts #coin-status-display,
body.large-fonts #combo-status-display { font-size: 20px; }

/* --- Settings menu section headers --- */
.settings-section {
  width: 100%;
  text-align: left;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #7DF9FF;
  opacity: 0.85;
  margin: 10px 0 2px 2px;
  padding-bottom: 3px;
  border-bottom: 1px solid rgba(125,249,255,0.22);
}
.settings-section:first-of-type { margin-top: 2px; }

/* --- Lifetime stats panel (About screen) --- */
.stats-heading {
  text-align: center;
  color: #f0c040;
  margin-bottom: 6px;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.stats-panel { margin: 6px auto 4px; max-width: 280px; text-align: left; }
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 4px;
  border-bottom: 1px dashed #444;
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #b0b0b0; }
.stat-value { color: #f0c040; font-weight: bold; }

/* --- About-screen message (open-source note) --- */
.dedication { color: #f0c040; font-size: 14px; line-height: 1.65; text-align: center; margin-top: 6px; }
.dedication .sig { display: block; margin-top: 8px; font-style: italic; color: #ffd970; }

/* --- Basic / Advanced settings expander --- */
.advanced-toggle {
  font-family: 'VT323', 'Courier New', Courier, monospace;
  width: 100%;
  text-align: center;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 6px 15px;
  margin: 4px 0 6px;
  border-radius: 6px;
  cursor: pointer;
  color: #7DF9FF;
  background-color: rgba(125,249,255,0.08);
  border: 1px dashed rgba(125,249,255,0.4);
  text-transform: uppercase;
}
.advanced-toggle .adv-arrow { display: inline-block; transition: transform 0.2s ease; }
.advanced-toggle.open .adv-arrow { transform: rotate(90deg); }
.advanced-panel { display: none; flex-direction: column; align-items: center; width: 100%; gap: 6px; }
.advanced-panel.open { display: flex; }

/* --- New-high-score celebration --- */
#confetti-layer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 300; overflow: hidden; }
.confetti-piece { position: absolute; top: -24px; border-radius: 1px; opacity: 0.95; animation-name: confetti-fall; animation-timing-function: linear; animation-fill-mode: forwards; }
@keyframes confetti-fall {
  0%   { transform: translateY(-24px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(106vh) rotate(560deg); opacity: 0.85; }
}
.newbest-banner {
  position: fixed; top: 16%; left: 50%;
  z-index: 320; pointer-events: none;
  font-family: 'VT323', 'Courier New', monospace; font-size: 32px; color: #FFD54F;
  text-shadow: 0 0 8px rgba(255,213,79,0.85), 2px 2px 2px rgba(0,0,0,0.5);
  white-space: nowrap;
  animation: newbest-pop 2s ease-out forwards;
}
@keyframes newbest-pop {
  0%   { opacity: 0; transform: translateX(-50%) scale(0.6); }
  15%  { opacity: 1; transform: translateX(-50%) scale(1.12); }
  30%  { transform: translateX(-50%) scale(1.0); }
  80%  { opacity: 1; transform: translateX(-50%) scale(1.0) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) scale(1.0) translateY(-22px); }
}

/* --- Pause overlay --- */
#pause-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  z-index: 60;
  cursor: pointer;
  border-radius: 5px;

#pause-overlay.shown { display: flex; }
#pause-overlay .pause-title {

#pause-overlay .pause-hint {

  font-size: 16px; color: #e8e8e8; margin-top: 8px; opacity: 0.9;
}
body.large-fonts #pause-overlay .pause-title { font-size: 48px; }
body.large-fonts #pause-overlay .pause-hint { font-size: 20px; }

        function getAudioCtx() {

                    if (!AC) return null;

        // One tone with an attack/decay envelope and an optional pitch glide.
        function __sfxTone(freq, freqEnd, type, dur, vol, delay) {
            const ctx = getAudioCtx();
            if (!ctx) return;
            const t0 = ctx.currentTime + (delay || 0);
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type || 'square';
            osc.frequency.setValueAtTime(freq, t0);
            if (freqEnd && freqEnd !== freq) {
                osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
            }
            gain.gain.setValueAtTime(0.0001, t0);
            gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.006);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t0);
            osc.stop(t0 + dur + 0.03);
        }

        function hexToRgb(hex) {

            if (hex.length === 4) {

                g = parseInt(hex[2] + hex[2], 16);

            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);

        function rgbToHex(r, g, b) {
            const compToHex = (c) => { const hexVal = c.toString(16);

        function adjustColor(hex, percent) {
            const { r, g, b } = hexToRgb(hex);

            const newG = Math.max(0, Math.min(255, g + amount));
            const newB = Math.max(0, Math.min(255, b + amount));
            return rgbToHex(newR, newG, newB);

        /* ============================================================
           SECTION: RENDERING — one frame
           Clears + draws board, food, coins, power-ups, then blits the snake's offscreen canvas.
           ============================================================ */
        function renderFrame() {
            clearCanvas();
            drawObstacles();
            drawNormalFoodOnCanvas();
            drawCoinsOnCanvas();
            drawActivePowerUp();

            if (snakeStatus.starMode) {
                drawStarPowerSnake();
            } else {
                if (snakeStatus.ghostMode) {
                    ctx.globalAlpha = 0.4;
                }
                // Blit the offscreen snake. IMPORTANT: pass the *logical* size (not bare 0,0).
                // The main ctx already carries a devicePixelRatio scale, so drawing at the
                // logical board size keeps the snake crisp and correctly placed on any density.
                // Dropping the width/height args reintroduces a high-DPI scaling bug.
                ctx.drawImage(snakeCanvas, 0, 0, tileCountX * gridSize, tileCountY * gridSize);
                ctx.globalAlpha = 1.0; // Reset alpha
            }

            if (graphicsModes[currentGraphicsModeIndex].name === 'ULTIMATE+' && !window.__reduceMotion) {
                drawUltimatePlusEffects();
            }
        }

        
        function updateGameLogic() {
            if (isGameOver || !isGameRunning || isSettingsMenuVisible || isMessageBoxVisible) { return;
            }

            if (inputQueue.length > 0) {
                const nextMove = inputQueue[0];
                const isReverseHorizontal = dx !== 0 && nextMove.dx === -dx;
                const isReverseVertical = dy !== 0 && nextMove.dy === -dy;
                if (!isReverseHorizontal && !isReverseVertical) {
                    dx = nextMove.dx;
                    dy = nextMove.dy;
                    inputQueue.shift();
                }
            }

            // Pre-move magnet snap to ensure immediate pickup (fixes 'chasing' bug)
            applyMagnetSnapPreMove();
            
            moveSnake(); 
            if (!snakeStatus.starMode) {
                redrawSnakeCanvas(); 
            }
            updateStatusAndPowerups();
            attemptPowerupSpawn();
            checkCollisions();
        }

        /* ============================================================
           SECTION: GAME LOOP — fixed timestep
           rAF-driven; uses an accumulator so snake speed is frame-rate independent.
           ============================================================ */
        function mainGameLoop(currentTime) {
            gameLoopAnimationId = requestAnimationFrame(mainGameLoop);
            const fpsLimit = fpsLimits[currentFpsLimitIndex].value;
            const frameInterval = 1000 / fpsLimit;
            const elapsedSinceLastRender = currentTime - lastRenderTime;
            if (elapsedSinceLastRender > frameInterval) {
                lastRenderTime = currentTime - (elapsedSinceLastRender % frameInterval);
                if (isGameOver || isSettingsMenuVisible || isMessageBoxVisible || isPaused) {
                    // Paused
                } else if (isGameRunning) {
                    const deltaTime = currentTime - lastFrameTime;
                    lastFrameTime = currentTime;

                    // Time-based scoring logic
                    timeScoreAccumulator += deltaTime;
                    if (timeScoreAccumulator >= 1000) {
                        const secondsPassed = Math.floor(timeScoreAccumulator / 1000);
                        const timePoints = secondsPassed * 2; // 2 points per second
                        addPoints(timePoints, true); // Add points (comboable)
                        updateScoreDisplay(); // Update the display immediately
                        timeScoreAccumulator -= secondsPassed * 1000; // Subtract processed time
                    }

                    // Fixed-timestep update: advance one logical step every `currentSnakeSpeed`
                    // milliseconds regardless of frame rate, so the snake moves at the same pace
                    // on a 60Hz or 144Hz screen. Lower currentSnakeSpeed = faster snake.
                    gameUpdateAccumulator += deltaTime;
                    while (gameUpdateAccumulator >= currentSnakeSpeed) {
                        updateGameLogic();
                        gameUpdateAccumulator -= currentSnakeSpeed;
                        if (isGameOver) break;
                    }
                } else {
                    lastFrameTime = currentTime;
                }
                renderFrame();
            }
        }

        /* ============================================================
           SECTION: GAME START / RESUME
           Begins (or restarts) play and (re)starts the loop with fresh timing.
           ============================================================ */
        function startGame() {
            if (isGameOver) {
                initGame();
            }
            isGameRunning = true;
            isGameOver = false;
            isPaused = false;
            hidePauseOverlay();
            hideSettingsMenuVisually();
            hideMessageBox();
            startRestartButton.innerHTML = PAUSE_ICON;
            lastFrameTime = performance.now();
            lastRenderTime = lastFrameTime;
            gameUpdateAccumulator = 0;
            if (gameLoopAnimationId) {
                cancelAnimationFrame(gameLoopAnimationId);
            }
            gameLoopAnimationId = requestAnimationFrame(mainGameLoop);
        }

        // --- Drawing Functions for Icons ---
        function drawNormalFoodIcon(x, y, size) {
            const sO = Math.max(1, Math.floor(size / 10));
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(x - size/2 + sO, y - size/2 + sO, size - sO, size - sO);
            ctx.fillStyle = UNIQUE_FOOD_GREEN;
            ctx.fillRect(x - size/2, y - size/2, size - sO, size - sO);
            ctx.strokeStyle = UNIQUE_FOOD_GREEN_BORDER;
            ctx.lineWidth = Math.max(1, Math.floor(size / 12));
            ctx.strokeRect(x - size/2 + ctx.lineWidth/2, y - size/2 + ctx.lineWidth/2, size - sO - ctx.lineWidth, size - sO - ctx.lineWidth);
        }

        function drawGhostIcon(x, y, size) {
            ctx.fillStyle = 'rgba(224, 224, 224, 0.8)';
            ctx.beginPath();
            ctx.arc(x, y, size * 0.35, Math.PI, 0);
            ctx.lineTo(x + size * 0.35, y + size * 0.25);
            ctx.quadraticCurveTo(x + size * 0.2, y + size * 0.4, x, y + size * 0.25);
            ctx.quadraticCurveTo(x - size * 0.2, y + size * 0.4, x - size * 0.35, y + size * 0.25);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.beginPath();
            ctx.arc(x - size * 0.12, y - size * 0.05, size * 0.07, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + size * 0.12, y - size * 0.05, size * 0.07, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMagnetIconV2(ctx, x, y, size) {
            ctx.save();
            const magnetWidth = size * 0.6;
            const magnetHeight = size * 0.5;
            const thickness = size * 0.2;
            const cornerRadius = size * 0.1;

            const glowPulse = (Math.sin(Date.now() / 250) + 1) / 2;
            const glowRadius = size * 0.5 + glowPulse * 4;
            const glowAlpha = 0.2 + glowPulse * 0.3;
            const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, glowRadius);
            glowGradient.addColorStop(0, `rgba(180, 200, 255, ${glowAlpha})`);
            glowGradient.addColorStop(1, `rgba(180, 200, 255, 0)`);
            ctx.fillStyle = glowGradient;
            ctx.fillRect(x - size / 2, y - size / 2, size, size);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.moveTo(x - magnetWidth / 2 + cornerRadius, y + magnetHeight / 2 + 2);
            ctx.lineTo(x + magnetWidth / 2 - cornerRadius, y + magnetHeight / 2 + 2);
            ctx.arcTo(x + magnetWidth / 2, y + magnetHeight / 2 + 2, x + magnetWidth / 2, y + magnetHeight / 2 - cornerRadius + 2, cornerRadius);
            ctx.lineTo(x + magnetWidth / 2, y - magnetHeight / 2 + cornerRadius + 2);
            ctx.fill();

            ctx.fillStyle = '#E74C3C';
            ctx.strokeStyle = '#A02C2C';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - magnetWidth / 2 + thickness, y - magnetHeight / 2);
            ctx.lineTo(x - magnetWidth / 2, y - magnetHeight / 2);
            ctx.lineTo(x - magnetWidth / 2, y + magnetHeight / 2 - cornerRadius);
            ctx.arcTo(x - magnetWidth / 2, y + magnetHeight / 2, x - magnetWidth / 2 + cornerRadius, y + magnetHeight / 2, cornerRadius);
            ctx.lineTo(x, y + magnetHeight / 2);
            ctx.lineTo(x, y + magnetHeight / 2 - thickness);
            ctx.arcTo(x - magnetWidth / 2 + cornerRadius, y + magnetHeight / 2 - thickness, x - magnetWidth / 2 + thickness, y + magnetHeight / 2 - cornerRadius - thickness, cornerRadius - 1);
            ctx.lineTo(x - magnetWidth / 2 + thickness, y - magnetHeight / 2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#3498DB';
            ctx.strokeStyle = '#256794';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + magnetWidth / 2 - thickness, y - magnetHeight / 2);
            ctx.lineTo(x + magnetWidth / 2, y - magnetHeight / 2);
            ctx.lineTo(x + magnetWidth / 2, y + magnetHeight / 2 - cornerRadius);
            ctx.arcTo(x + magnetWidth / 2, y + magnetHeight / 2, x + magnetWidth / 2 - cornerRadius, y + magnetHeight / 2, cornerRadius);
            ctx.lineTo(x, y + magnetHeight / 2);
            ctx.lineTo(x, y + magnetHeight / 2 - thickness);
            ctx.arcTo(x + magnetWidth / 2 - cornerRadius, y + magnetHeight / 2 - thickness, x + magnetWidth / 2 - thickness, y + magnetHeight / 2 - cornerRadius - thickness, cornerRadius - 1);
            ctx.lineTo(x + magnetWidth / 2 - thickness, y - magnetHeight / 2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawStarIcon(x, y, size) {
            const outerRadius = size * 0.4;
            const innerRadius = size * 0.18;
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = Math.max(1, size * 0.05);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(x + Math.cos((18 + i * 72) * Math.PI / 180) * outerRadius, y + Math.sin((18 + i * 72) * Math.PI / 180) * outerRadius);
                ctx.lineTo(x + Math.cos((54 + i * 72) * Math.PI / 180) * innerRadius, y + Math.sin((54 + i * 72) * Math.PI / 180) * innerRadius);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(x - outerRadius * 0.3, y - outerRadius * 0.3, size * 0.05, 0, Math.PI*2);
            ctx.fill();
        }

        function drawShinySteelObstacle(ctx, x, y, size = 20) {
            const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
            gradient.addColorStop(0, '#dfe4ea');
            gradient.addColorStop(0.3, '#a4b0be');
            gradient.addColorStop(0.6, '#57606f');
            gradient.addColorStop(1, '#2f3542');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, size, size);
            const shineGradient = ctx.createRadialGradient(
                x + size * 0.3, y + size * 0.3, 1,
                x + size * 0.3, y + size * 0.3, size * 0.8
            );
            shineGradient.addColorStop(0, 'rgba(255,255,255,0.3)');
            shineGradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shineGradient;
            ctx.fillRect(x, y, size, size);
        }
        
        function drawLengthCutterIconV2(ctx, x, y, size) {
            ctx.save();
            const handleSize = size * 0.25;
            const bladeLength = size * 0.8;
            const bladeWidth = size * 0.2;

            ctx.fillStyle = '#4A4A4A';
            ctx.strokeStyle = '#202020';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y + size * 0.2, handleSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            const bladeGradient = ctx.createLinearGradient(x, y, x, y - bladeLength);
            bladeGradient.addColorStop(0, '#A0A0A0');
            bladeGradient.addColorStop(0.5, '#F0F0F0');
            bladeGradient.addColorStop(1, '#C0C0C0');

            ctx.fillStyle = bladeGradient;
            ctx.strokeStyle = '#606060';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - bladeWidth / 2, y - bladeLength * 0.2);
            ctx.lineTo(x, y - bladeLength);
            ctx.lineTo(x + bladeWidth / 2, y - bladeLength * 0.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            const shimmerPulse = (Date.now() / 200) % (bladeLength * 1.5) - (bladeLength * 0.25);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.moveTo(x - bladeWidth / 2, y - shimmerPulse);
            ctx.lineTo(x + bladeWidth / 2, y - shimmerPulse);
            ctx.lineTo(x + bladeWidth / 2, y - shimmerPulse - size * 0.08);
            ctx.lineTo(x - bladeWidth / 2, y - shimmerPulse - size * 0.08);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawCoinIcon(x, y, size) {
            ctx.save();
            const outlineWidth = Math.max(1, Math.floor(size / 15));
            const mainCoinColor = '#FFD700';
            const shadowCoinColor = '#DAA520';
            const highlightCoinColor = '#FFFFE0';
            const darkOutlineColor = '#A07000';
            ctx.fillStyle = darkOutlineColor;
            ctx.beginPath();
            ctx.arc(x, y + outlineWidth / 2, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            const gradient = ctx.createRadialGradient(x - size * 0.05, y - size * 0.05, size * 0.05, x, y, size * 0.4);
            gradient.addColorStop(0, highlightCoinColor);
            gradient.addColorStop(0.6, mainCoinColor);
            gradient.addColorStop(1, shadowCoinColor);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            const starOuterRadius = size * 0.18;
            const starInnerRadius = size * 0.07;
            ctx.fillStyle = shadowCoinColor;
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(x + Math.cos((18 + i * 72) * Math.PI / 180) * starOuterRadius, y + Math.sin((18 + i * 72) * Math.PI / 180) * starOuterRadius);
                ctx.lineTo(x + Math.cos((54 + i * 72) * Math.PI / 180) * starInnerRadius, y + Math.sin((54 + i * 72) * Math.PI / 180) * starInnerRadius);
            }
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.ellipse(x - size * 0.15, y - size * 0.15, size * 0.1, size * 0.06, -Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // --- Main Drawing Functions ---
        /* ============================================================
           SECTION: RENDERING HELPERS
           Beveled blocks + the food/coin/power-up icon drawing.
           ============================================================ */
        function drawStyledBlock(targetCtx, xGrid, yGrid, size, fillColor) {
            const blockX = xGrid * size;
            const blockY = yGrid * size;
            const currentGraphicsMode = graphicsModes[currentGraphicsModeIndex].name;
            
            if (currentGraphicsMode === 'PERFORMANCE') {
                if (fillColor) { targetCtx.fillStyle = fillColor;
                    targetCtx.fillRect(blockX, blockY, size, size); }
                return;
            }

            if (fillColor && blockImageCache[fillColor]) {
                targetCtx.drawImage(blockImageCache[fillColor], blockX, blockY);
                if (!window.__reduceMotion && currentGraphicsMode.includes('ULTIMATE')) {
                    const time = Date.now();
                    const shimmerAlpha = (Math.sin(time / 400 + (blockX + blockY) / (size * 2)) + 1) / 2 * 0.15 + 0.05;
                    targetCtx.fillStyle = `rgba(255, 255, 255, ${shimmerAlpha})`;
                    const innerBevelSize = Math.max(1, Math.floor(size / 9));
                    targetCtx.fillRect(blockX + innerBevelSize + 1, blockY + innerBevelSize + 1, size - (innerBevelSize + 1) * 2, size - (innerBevelSize + 1) * 2);
                }
                return;
            }
            
            if (fillColor) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext('2d');
                
                const colors = {
                    main: fillColor,
                    shadow1: adjustColor(fillColor, -20),
                    shadow2: adjustColor(fillColor, -40),
                    highlight: adjustColor(fillColor, 10),
                    highlight2: adjustColor(fillColor, 15)
                };

                let bevelSize = Math.max(1, Math.floor(size / 8));
                let innerBevelSize = Math.max(1, Math.floor(size / 12));

                if (currentGraphicsMode.includes('ULTRA') || currentGraphicsMode.includes('ULTIMATE')) {
                    bevelSize = Math.max(1, Math.floor(size / 6));
                    innerBevelSize = Math.max(1, Math.floor(size / 9));
                    const gradient = tempCtx.createLinearGradient(0, 0, size, size);
                    gradient.addColorStop(0, adjustColor(fillColor, 5));
                    gradient.addColorStop(1, adjustColor(fillColor, -5));
                    tempCtx.fillStyle = gradient;
                    tempCtx.fillRect(0, 0, size, size);
                } else { // Quality Mode
                    tempCtx.fillStyle = colors.main;
                    tempCtx.fillRect(0, 0, size, size);
                }

                tempCtx.fillStyle = colors.shadow1;
                tempCtx.beginPath(); tempCtx.moveTo(size - bevelSize, bevelSize); tempCtx.lineTo(size, 0);
                tempCtx.lineTo(size, size); tempCtx.lineTo(size - bevelSize, size - bevelSize); tempCtx.closePath(); tempCtx.fill();
                tempCtx.fillStyle = colors.shadow2;
                tempCtx.beginPath(); tempCtx.moveTo(bevelSize, size - bevelSize); tempCtx.lineTo(0, size);
                tempCtx.lineTo(size, size); tempCtx.lineTo(size - bevelSize, size - bevelSize); tempCtx.closePath(); tempCtx.fill();
                tempCtx.fillStyle = colors.highlight;
                tempCtx.fillRect(0, 0, bevelSize, size); tempCtx.fillRect(bevelSize, 0, size - bevelSize, bevelSize);
                tempCtx.fillStyle = colors.highlight2;
                tempCtx.fillRect(innerBevelSize, innerBevelSize, size - innerBevelSize * 2, size - innerBevelSize * 2);
                tempCtx.fillStyle = colors.main;
                tempCtx.fillRect(innerBevelSize + 1, innerBevelSize + 1, size - (innerBevelSize + 1) * 2, size - (innerBevelSize + 1) * 2);

                blockImageCache[fillColor] = tempCanvas;
                drawStyledBlock(targetCtx, xGrid, yGrid, size, fillColor);
            }
        }

        // --- REFACTORED: Master function to draw the snake to the offscreen canvas ---
        function redrawSnakeCanvas() {
            snakeCtx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);
            
            const currentSkin = snakeSkins[currentSnakeSkinIndex];
            let headColorToUse, bodyPatternType, bodyPatternColors;

            if (currentSkin && currentSkin.patternType === 'theme_default') {
                const snakeTheme = gameThemes[currentGameThemeIndex];
                headColorToUse = snakeTheme.snakeHead;
                bodyPatternType = 'solid';
                bodyPatternColors = [snakeTheme.snakeBody];
            } else {
                headColorToUse = currentSkin.headColor;
                bodyPatternType = currentSkin.patternType;
                bodyPatternColors = currentSkin.bodyPattern;
            }

            snake.forEach((segment, index) => {
                let segmentColor;
                if (index === 0) {
                    segmentColor = headColorToUse;
                } else {
                    switch (bodyPatternType) {
                        case 'alternating':
                        case 'striped_thin':
                            segmentColor = bodyPatternColors[(index - 1) % bodyPatternColors.length];
                            break;
                        case 'solid_body_only':
                        case 'solid':
                        default:
                            segmentColor = bodyPatternColors[0];
                            break;
                    }
                }
                drawStyledBlock(snakeCtx, segment.x, segment.y, gridSize, segmentColor);
            });
        }
        
        // --- NEW: Function to draw the snake directly for Star Power effect ---
        function drawStarPowerSnake() {
            const starColors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];
            snake.forEach((segment, index) => {
                const segmentColor = (window.__reduceMotion ? '#FFD400' : starColors[Math.floor(Date.now() / 100 + index) % starColors.length]);
                drawStyledBlock(ctx, segment.x, segment.y, gridSize, segmentColor);
            });
    }

        // --- NEW: Ultimate+ Effects ---
        function drawUltimatePlusEffects() {
            ctx.save();
            const pulse = (Math.sin(Date.now() / 300) + 1) / 2;
            ctx.globalAlpha = 0.15 + pulse * 0.2;
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 10 + pulse * 10;
            ctx.drawImage(snakeCanvas, 0, 0, tileCountX * gridSize, tileCountY * gridSize);
            ctx.restore();
        }

        function drawNormalFoodOnCanvas() {
            if (!foodItem) return;
            const theme = gameThemes[currentGameThemeIndex];
            const currentGraphicsMode = graphicsModes[currentGraphicsModeIndex].name;
            drawStyledBlock(ctx, foodItem.x, foodItem.y, gridSize, theme.foodColor);
            if (!window.__reduceMotion && currentGraphicsMode.includes('ULTIMATE')) {
                const time = Date.now();
                const animSpeed = 600;
                const blockX = foodItem.x * gridSize;
                const blockY = foodItem.y * gridSize;
                const foodCenterX = blockX + gridSize / 2;
                const foodCenterY = blockY + gridSize / 2;
                const pulseFactor = (Math.sin(time / animSpeed + (foodItem.x + foodItem.y) / 5) + 1) / 2;
                const highlightRadius = gridSize * 0.15 * (0.5 + pulseFactor * 0.5);
                const highlightAlpha = 0.4 + pulseFactor * 0.3;
                ctx.fillStyle = `rgba(255, 255, 220, ${highlightAlpha})`;
                ctx.beginPath();
                ctx.arc(foodCenterX, foodCenterY, Math.max(1, highlightRadius), 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function drawCoinsOnCanvas() {
            if (!activeCoinItems || activeCoinItems.length === 0) return;
            const now = Date.now();
            activeCoinItems.forEach(coin => {
                const bobbingOffset = Math.sin(now / 200 + coin.x) * 2;
                const x = coin.x * gridSize + gridSize / 2;
                const y = coin.y * gridSize + gridSize / 2 + bobbingOffset;
                
                const pulseFactor = (window.__reduceMotion ? 0 : ((Math.sin(now / 175 + coin.x) + 1) / 2));
                const glowRadius = gridSize * 0.5 + (gridSize * 0.4 * pulseFactor);
                const glowAlpha = 0.2 + (0.4 * pulseFactor);
                ctx.fillStyle = `rgba(255, 223, 0, ${glowAlpha})`;
                ctx.beginPath();
                ctx.arc(x, y, glowRadius, 0, Math.PI * 2);
                ctx.fill();
                
                const iconKey = POWERUP_TYPE_COIN;
                if (activeIconCache[iconKey]) {
                    ctx.drawImage(activeIconCache[iconKey], x - gridSize / 2, y - gridSize / 2 + bobbingOffset);
                } else {
                    drawCoinIcon(x, y, gridSize);
                }
             });
        }
        
        function drawActivePowerUp() {
            if (!activePowerUpItem) return;
            const x = activePowerUpItem.x * gridSize + gridSize / 2;
            const y = activePowerUpItem.y * gridSize + gridSize / 2;
            const iconKey = activePowerUpItem.type;

            if (activeIconCache[iconKey]) {
                ctx.drawImage(activeIconCache[iconKey], x - gridSize / 2, y - gridSize / 2);
                if (iconKey === POWERUP_TYPE_FOOD_MAGNET) {
                    drawMagnetIconV2(ctx, x, y, gridSize);
                }
            } else { 
                if (iconKey === POWERUP_TYPE_GHOST) drawGhostIcon(x, y, gridSize);
                else if (iconKey === POWERUP_TYPE_STAR) drawStarIcon(x, y, gridSize);
                else if (iconKey === POWERUP_TYPE_FOOD_MAGNET) drawMagnetIconV2(ctx, x, y, gridSize);
                else if (iconKey === POWERUP_TYPE_LENGTH_CUTTER) drawLengthCutterIconV2(ctx, x, y, gridSize);
                else if (iconKey === POWERUP_TYPE_COIN) drawCoinIcon(x, y, gridSize);
            }
        }

        function drawObstacles(){
            if(!obstaclesEnabled || obstaclesArray.length === 0) return;
            obstaclesArray.forEach(obs => {
                drawShinySteelObstacle(ctx, obs.x * gridSize, obs.y * gridSize, gridSize);
            });
        }
        
        function clearCanvas() {
            const theme = gameThemes[currentGameThemeIndex];
            ctx.fillStyle = theme.canvasBg;
            const __w = (typeof tileCountX !== 'undefined' ? tileCountX * gridSize : canvas.width);
            const __h = (typeof tileCountY !== 'undefined' ? tileCountY * gridSize : canvas.height);
            ctx.fillRect(0, 0, __w, __h);
        }

        function drawGameOnDemand(){
            redrawSnakeCanvas();
            renderFrame();
        }

        function updateStatusDisplay() {
            const now = Date.now();

            coinStatusDisplay.textContent = `COINS: ${coinsCollectedThisGame}/${COIN_COLLECTION_GOAL}`;

            if (comboCounter > 1 && now < lastItemCollectionTime + COMBO_TIMER_DURATION) {
                const timeLeft = ((lastItemCollectionTime + COMBO_TIMER_DURATION) - now) / 1000;
                comboStatusDisplay.textContent = `COMBO x${comboCounter}: ${timeLeft.toFixed(1)}s`;
                comboStatusDisplay.classList.add('visible');
            } else {
                if(comboCounter > 0 && now >= lastItemCollectionTime + COMBO_TIMER_DURATION) {
                    comboCounter = 0;
                }
                comboStatusDisplay.classList.remove('visible');
            }
            
        }

        // --- Game Logic Functions ---
        function shrinkSnake(segs){ 
            for(let i=0;i<segs;i++){
                if(snake.length>MIN_SNAKE_LENGTH){
                    snake.pop();
                } else {
                    break;
                }
            }
            redrawSnakeCanvas(); // Redraw after shrinking
        }
        
        /* ============================================================
           SECTION: SCORING & COMBO
           Combo multiplier on quick consecutive pickups; addPoints applies it.
           ============================================================ */
        function updateCombo() {
            const now = Date.now();
            if (now - lastItemCollectionTime <= COMBO_TIMER_DURATION) {
                comboCounter++;
            } else {
                comboCounter = 1;
            }
            lastItemCollectionTime = now;
            if (comboCounter > maxComboThisGame) maxComboThisGame = comboCounter;
        }

        function addPoints(bP, isComboable = true){ 
            let pTA=bP;
            if (isComboable && comboCounter > 1) {
                pTA *= comboCounter;
            }
            if(obstaclesMode===OBSTACLE_MODE_CLASSIC){ pTA=Math.floor(pTA*SCORE_BONUS_OBSTACLES); }
            else if (obstaclesMode===OBSTACLE_MODE_EXTREME){ pTA=Math.floor(pTA*(SCORE_BONUS_OBSTACLES*2)); }
            score+=pTA;
            if (!newHighCelebrated && gameStartBest > 0 && score > gameStartBest) {
                newHighCelebrated = true;
                celebrateNewHighScore(true);
            }
        }

        function recordPowerUpCollected(type) { powerUpsCollectedInGame[type] = (powerUpsCollectedInGame[type] || 0) + 1;
        }
        
        function updateStatusAndPowerups() {
            const now = Date.now();
            let needsRedraw = false;

            // Coin TTL: remove expired coins
            activeCoinItems = activeCoinItems.filter(c => !c.spawnTime || now - c.spawnTime <= COIN_TTL_MS);

            if (snakeStatus.starMode && now > snakeStatus.starModeEndTime) { 
                snakeStatus.starMode = false;
                needsRedraw = true;
            }
            if (snakeStatus.ghostMode && now > snakeStatus.ghostModeEndTime) { 
                snakeStatus.ghostMode = false;
                needsRedraw = true;
            }
            
            if (snakeStatus.foodMagnetActive && now > snakeStatus.foodMagnetActiveEndTime) {
                snakeStatus.foodMagnetActive = false;
            } else if (snakeStatus.foodMagnetActive) {
                const head = snake[0];
                let itemsToPull = [];
                if (foodItem) { itemsToPull.push(foodItem); }
                if (activePowerUpItem) { itemsToPull.push(activePowerUpItem); }
                itemsToPull = itemsToPull.concat(activeCoinItems);

                itemsToPull.forEach(item => {
                    const headPosPx = { x: head.x * gridSize + gridSize / 2, y: head.y * gridSize + gridSize / 2 };
                    const itemPosPx = { x: item.x * gridSize + gridSize / 2, y: item.y * gridSize + gridSize / 2 };
                    const distX_px = headPosPx.x - itemPosPx.x;
                    const distY_px = headPosPx.y - itemPosPx.y;
                    const distance_px = Math.sqrt(distX_px * distX_px + distY_px * distY_px);

                    // Only gentle pull post-move to avoid 'trailing' bug; snapping is done pre-move
                    if (distance_px < FOOD_MAGNET_RADIUS) {
                        const pullSpeedFactor = 0.45;
                        let newX = Math.round((itemPosPx.x + distX_px * pullSpeedFactor - gridSize / 2) / gridSize);
                        let newY = Math.round((itemPosPx.y + distY_px * pullSpeedFactor - gridSize / 2) / gridSize);
                        item.x = Math.max(0, Math.min(tileCountX - 1, newX));
                        item.y = Math.max(0, Math.min(tileCountY - 1, newY));
                    }
                });
            }
            
            if (needsRedraw) {
                redrawSnakeCanvas();
            }
            updateStatusDisplay();
        }

        function attemptPowerupSpawn() {
             const now = Date.now();
             if (powerUpsEnabled && !activePowerUpItem && totalFoodEatenInCurrentGame >= THEME_CYCLE_FOOD_COUNT && !powerUpSpawnedThisThemeCycle && now > lastPowerUpItemSpawnAttempt + POWERUP_ITEM_SPAWN_INTERVAL) {
                 if (Math.random() < POWERUP_ITEM_SPAWN_CHANCE_PER_INTERVAL) {
                     placeItemPowerUp();
                 }
                 lastPowerUpItemSpawnAttempt = now;
             }
             if (activePowerUpItem && activePowerUpItem.foodEatenWhileActive >= POWERUP_DESPAWN_FOOD_COUNT) {
                 activePowerUpItem = null;
             }
        }
        
        /* ============================================================
           SECTION: SNAKE MOVEMENT
           Advances the head (wraps when Walls are off), handles eating and growth.
           ============================================================ */
        function moveSnake() {
            let __hx = snake[0].x + dx;
            let __hy = snake[0].y + dy;
            if (!wallsEnabled) {
                __hx = (__hx + tileCountX) % tileCountX;
                __hy = (__hy + tileCountY) % tileCountY;
            }
            const head = { x: __hx, y: __hy };
            const ateFood = (foodItem && head.x === foodItem.x && head.y === foodItem.y);

            snake.unshift(head);

            if (!ateFood) {
                if (snake.length > MIN_SNAKE_LENGTH) {
                    snake.pop();
                }
            }

            if (ateFood) {
                playSfx(sfxEat);
                triggerHaptic('LIGHT');
                updateCombo();
                totalFoodEatenInCurrentGame++;
                normalFoodEatenInGame++;
                totalFoodEatenOverall++;
                playerUnlockLevel = totalFoodEatenOverall;
                checkAndQueueNewUnlocksIfThresholdMet();
                const diffConfig = difficultySettings[difficultyLevels[currentDifficultyIndex]];
                addPoints(diffConfig.pointsPerFood);
                foodEatenForThemeCycle++;
                if (activePowerUpItem) activePowerUpItem.foodEatenWhileActive++;
                
                // Spawn a random number of coins (1..4) using weighted distribution every time food is eaten
                const nCoins = chooseRandomCoinSpawnCount();
                spawnCoins(nCoins);

                if (obstaclesEnabled) {
                    if (totalFoodEatenInCurrentGame >= THEME_CYCLE_FOOD_COUNT) foodEatenForObstacleGrowth++;
                    foodEatenForObstacleClearCycle++;
                    if (totalFoodEatenInCurrentGame >= THEME_CYCLE_FOOD_COUNT && !initialObstaclesSpawnedThisGame) {
                        spawnInitialObstacles();
                        initialObstaclesSpawnedThisGame = true;
                    }
                    if (foodEatenForObstacleGrowth >= OBSTACLE_GROWTH_FOOD_THRESHOLD && obstaclesArray.length < MAX_OBSTACLES) {
                        addSingleObstacle();
                        foodEatenForObstacleGrowth = 0;
                    }
                    if (foodEatenForObstacleClearCycle >= OBSTACLE_CLEAR_CYCLE_FOOD_COUNT) {
                        clearAllObstacles();
                        spawnInitialObstacles();
                        foodEatenForObstacleClearCycle = 0;
                        foodEatenForObstacleGrowth = 0;
                    }
                }
                const currentDiffConfig = difficultySettings[difficultyLevels[currentDifficultyIndex]];
                if (currentSnakeSpeed > currentDiffConfig.minSpeed) {
                    currentSnakeSpeed -= currentDiffConfig.speedIncrement;
                    if (currentSnakeSpeed < currentDiffConfig.minSpeed) currentSnakeSpeed = currentDiffConfig.minSpeed;
                }
                updateScoreDisplay();
                placeNormalFood();
                
                if (!keepThemeEnabled && foodEatenForThemeCycle >= THEME_CYCLE_THRESHOLD) {
                    foodEatenForThemeCycle = 0;
                    currentGameThemeIndex = (currentGameThemeIndex + 1) % gameThemes.length;
                }
                if (normalFoodEatenInGame % THEME_CYCLE_FOOD_COUNT === 0) {
                    powerUpSpawnedThisThemeCycle = false;
                }
            }

            if (activePowerUpItem && head.x === activePowerUpItem.x && head.y === activePowerUpItem.y) {
                playSfx(sfxPowerup);
                triggerHaptic('MEDIUM');
                const now = Date.now();
                recordPowerUpCollected(activePowerUpItem.type);
                updateCombo();
                switch (activePowerUpItem.type) {
                    case POWERUP_TYPE_GHOST: snakeStatus.ghostMode = true; snakeStatus.ghostModeEndTime = now + GHOST_DURATION; addPoints(POINTS_GHOST_POWERUP); break;
                    case POWERUP_TYPE_STAR: snakeStatus.starMode = true; snakeStatus.starModeEndTime = now + STAR_DURATION; addPoints(POINTS_STAR_POWERUP); redrawSnakeCanvas(); break;
                    case POWERUP_TYPE_FOOD_MAGNET: snakeStatus.foodMagnetActive = true; snakeStatus.foodMagnetActiveEndTime = now + FOOD_MAGNET_DURATION; addPoints(POINTS_FOOD_MAGNET_POWERUP); break;
                    case POWERUP_TYPE_LENGTH_CUTTER: shrinkSnake(LENGTH_CUTTER_SEGMENTS_TO_REMOVE); addPoints(POINTS_LENGTH_CUTTER); break;
                }
                activePowerUpItem = null;
                updateScoreDisplay();
                updateStatusDisplay();
            }

            // Collect ALL coins at the head position (handles overlaps)
            let collected = 0;
            for (let i = activeCoinItems.length - 1; i >= 0; i--) {
                const coin = activeCoinItems[i];
                if (head.x === coin.x && head.y === coin.y) {
                    activeCoinItems.splice(i, 1);
                    coinsCollectedThisGame++;
                    coinsCollectedThisGameTotal++;
                    collected++;
                }
            }
            if (collected > 0) {
                playSfx(sfxCoin);
                triggerHaptic('LIGHT');
                updateCombo();
                updateStatusDisplay();
                if (coinsCollectedThisGame >= COIN_COLLECTION_GOAL) {
                    if(obstaclesEnabled) {
                        obstaclesArray.forEach(obs => addPoints(POINTS_PER_OBSTACLE_EATEN, false));
                        clearAllObstacles();
                    }
                    addPoints(COIN_REWARD_BONUS_POINTS, false);
                    const now = Date.now();
                    snakeStatus.ghostMode = true;
                    snakeStatus.ghostModeEndTime = now + GHOST_DURATION;
                    snakeStatus.foodMagnetActive = true;
                    snakeStatus.foodMagnetActiveEndTime = now + FOOD_MAGNET_DURATION;
                    coinsCollectedThisGame = 0;
                    updateScoreDisplay();
                    updateStatusDisplay();
                }
            }
        }

        /* ============================================================
           SECTION: COLLISIONS
           Walls (unless wrapping), self, and obstacles -> triggerGameOver.
           ============================================================ */
        function checkCollisions(){
            const head=snake[0];
            if(wallsEnabled && (head.x<0||head.x>=tileCountX||head.y<0||head.y>=tileCountY)){triggerGameOver("HIT A WALL!");return;}
            if(obstaclesEnabled){
                for(let i=obstaclesArray.length-1;i>=0;i--){
                    const obs=obstaclesArray[i];
                    if(head.x===obs.x&&head.y===obs.y){
                        if(snakeStatus.starMode){
                            if (obstaclesMode===OBSTACLE_MODE_EXTREME) {
                                const count = obstaclesArray.length;
                                obstaclesArray = [];
                                for (let k=0;k<count;k++) addPoints(POINTS_PER_OBSTACLE_EATEN, false);
                                updateScoreDisplay();
                                break;
                            } else {
                                obstaclesArray.splice(i,1);
                                addPoints(POINTS_PER_OBSTACLE_EATEN, false);
                                updateScoreDisplay();
                            }
                        }
                        else{triggerGameOver("HIT AN OBSTACLE!");return;}
                    }
                }
            }
            if(snakeStatus.ghostMode||snakeStatus.starMode)return;
            for(let i=1;i<snake.length;i++){if(head.x===snake[i].x&&head.y===snake[i].y){triggerGameOver("ATE YOURSELF!");return;}}
        }
        function isGridSquareOccupied(pos) {
            if (snake && snake.some(segment => segment.x === pos.x && segment.y === pos.y)) return true;
            if (foodItem && foodItem.x === pos.x && foodItem.y === pos.y) return true;
            if (activePowerUpItem && activePowerUpItem.x === pos.x && activePowerUpItem.y === pos.y) return true;
            if (activeCoinItems.some(coin => coin.x === pos.x && coin.y === pos.y)) return true;
            if (obstaclesArray.some(obstacle => obstacle.x === pos.x && obstacle.y === pos.y)) return true;
            return false;
        }

        // === Unified Free-Cell Spawner & Helpers ===
        function devAssert(condition, message) {
            if (!condition) {
                console.error("[ASSERT FAILED]", message);
            }
        }
        function posKey(x, y) { return x + "," + y; }
        function getOccupiedSet() {
            const occ = new Set();
            if (snake) { snake.forEach(seg => occ.add(posKey(seg.x, seg.y))); }
            if (foodItem) { occ.add(posKey(foodItem.x, foodItem.y)); }
            if (activePowerUpItem) { occ.add(posKey(activePowerUpItem.x, activePowerUpItem.y)); }
            if (activeCoinItems && activeCoinItems.length) {
                activeCoinItems.forEach(c => occ.add(posKey(c.x, c.y)));
            }
            if (obstaclesArray && obstaclesArray.length) {
                obstaclesArray.forEach(o => occ.add(posKey(o.x, o.y)));
            }
            return occ;
        }
        function getFreeCells() {
            const occ = getOccupiedSet();
            const free = [];
            for (let y = 0; y < tileCountY; y++) {
                for (let x = 0; x < tileCountX; x++) {
                    if (!occ.has(posKey(x, y))) {
                        free.push({ x, y });
                    }
                }
            }
            return free;
        }
        function pickRandomFreeCells(k) {
            const free = getFreeCells();
            if (free.length === 0) return [];
            const needed = Math.min(k, free.length);
            // sample without replacement
            for (let i = free.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = free[i]; free[i] = free[j]; free[j] = tmp;
            }
            return free.slice(0, needed);
        }
        function chooseRandomCoinSpawnCount() {
            const total = COIN_SPAWN_WEIGHTS.reduce((a,b)=>a+b.weight,0);
            let r = Math.random() * total;
            for (const w of COIN_SPAWN_WEIGHTS) {
                if (r < w.weight) return w.count;
                r -= w.weight;
            }
            return 1; // fallback
        }
        function spawnCoins(n) {
            const spots = pickRandomFreeCells(n);
            const now = Date.now();
            spots.forEach(p => {
                devAssert(!isGridSquareOccupied(p), "spawnCoins picked an occupied cell at " + JSON.stringify(p));
                activeCoinItems.push({ x: p.x, y: p.y, spawnTime: now });
            });
        }
        

    
        // === Magnet Pre-Move Snap (fixes 'chasing' bug) ===
        function applyMagnetSnapPreMove() {
            if (!snakeStatus.foodMagnetActive) return;
            const head = snake[0];
            if (!head) return;
            const nextHeadPos = { x: head.x + dx, y: head.y + dy };
            const headPosPx = { x: head.x * gridSize + gridSize / 2, y: head.y * gridSize + gridSize / 2 };

            const items = [];
            if (foodItem) items.push(foodItem);
            if (activePowerUpItem) items.push(activePowerUpItem);
            if (activeCoinItems && activeCoinItems.length) items.push(...activeCoinItems);

            items.forEach(item => {
                const itemPosPx = { x: item.x * gridSize + gridSize / 2, y: item.y * gridSize + gridSize / 2 };
                const dxPx = headPosPx.x - itemPosPx.x;
                const dyPx = headPosPx.y - itemPosPx.y;
                const dist = Math.hypot(dxPx, dyPx);
                if (dist <= MAGNET_SNAP_RADIUS_PX) {
                    item.x = nextHeadPos.x;
                    item.y = nextHeadPos.y;
                }
            });
        }
        
        /* ============================================================
           SECTION: FOOD, COINS & POWER-UPS
           Spawning + pickup handling for everything edible/collectible.
           ============================================================ */
        function placeNormalFood() {
            const spots = pickRandomFreeCells(1);
            if (spots.length === 0) {
                triggerGameOver("NO SPACE FOR FOOD!");
                return;
            }
            const p = spots[0];
            devAssert(!isGridSquareOccupied(p), "placeNormalFood picked an occupied cell");
            foodItem.x = p.x;
            foodItem.y = p.y;
            foodItem.type = FOOD_TYPE_NORMAL;
        }
        
        function placeItemPowerUp(){
            if(!foodItem||activePowerUpItem||!powerUpsEnabled||totalFoodEatenInCurrentGame<THEME_CYCLE_FOOD_COUNT||powerUpSpawnedThisThemeCycle)return;
            const powerUpWeights = [
                { type: POWERUP_TYPE_LENGTH_CUTTER, weight: 25 },
                { type: POWERUP_TYPE_FOOD_MAGNET, weight: 20 },
                { type: POWERUP_TYPE_GHOST, weight: 15 }
            ];
            if (obstaclesEnabled) { powerUpWeights.push({ type: POWERUP_TYPE_STAR, weight: 10 }); }
            if (powerUpWeights.length===0)return;
            let totalWeight = 0; powerUpWeights.forEach(item => totalWeight += item.weight);
            let randomPick = Math.random() * totalWeight; let chosenType = null;
            for (const item of powerUpWeights) { if (randomPick < item.weight) { chosenType = item.type; break; } randomPick -= item.weight; }
            if (!chosenType) { chosenType = powerUpWeights[0].type; }

            const spot = pickRandomFreeCells(1)[0];
            if (spot) {
                devAssert(!isGridSquareOccupied(spot), "placeItemPowerUp picked an occupied cell");
                activePowerUpItem = { x: spot.x, y: spot.y, type: chosenType, foodEatenWhileActive: 0 };
                powerUpSpawnedThisThemeCycle = true;
            }
        }
        
        function spawnInitialObstacles(){ obstaclesArray=[];if(obstaclesEnabled&&totalFoodEatenInCurrentGame>=THEME_CYCLE_FOOD_COUNT){for(let i=0;i<INITIAL_OBSTACLES_COUNT;i++){addSingleObstacle();}}}
        
        function addSingleObstacle() {
            if (obstaclesArray.length >= MAX_OBSTACLES) return;
            const spot = pickRandomFreeCells(1)[0];
            if (spot) {
                devAssert(!isGridSquareOccupied(spot), "addSingleObstacle picked an occupied cell");
                obstaclesArray.push(spot);
            }
        }
        function clearAllObstacles(){ obstaclesArray=[];}
        /* ============================================================
           SECTION: GAME OVER
           Finalizes the round, records stats/high score, shows the summary.
           ============================================================ */
        function triggerGameOver(reason = "") {
            triggerHaptic('HEAVY');
            isGameRunning = false;

            const finalSnakeLength = snake ? snake.length : 0;

            let gameStatsHTML = `<div style="text-align: left; margin-top: 10px;"><p><strong>Time Played:</strong> ${timePlayedFormatted}</p><p><strong>Final Length:</strong> ${finalSnakeLength}</p><p><strong>Normal Food Eaten:</strong> ${normalFoodEatenInGame}</p>`;
            let powerUpsSummary = "";

            const powerUpNames = { [POWERUP_TYPE_LENGTH_CUTTER]: "Length Cutters", [POWERUP_TYPE_FOOD_MAGNET]: "Food Magnets", [POWERUP_TYPE_GHOST]: "Ghost Modes", [POWERUP_TYPE_STAR]: "Star Powers" };
            powerUpOrder.forEach(type => { if (powerUpsCollectedInGame[type] > 0) { powerUpsSummary += `<li>${powerUpNames[type] || type}: ${powerUpsCollectedInGame[type]}</li>`; } });

            } else { gameStatsHTML += `<p><strong>Items Collected:</strong> None</p>`; }

        function updateScoreDisplay(){ scoreDisplay.textContent=`SCORE: ${score}`;}

        /* ============================================================
