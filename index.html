        function showAboutInfo(){ 
            playSfx(sfxClick);
            const eLOC=3739; // Updated line count
            const aC=`<p id="version-number-text" class="version-text" title="Tap me lots!">Version 2.0</p><p class="code-lines-text">${eLOC} Lines of Code</p><div class="separator"></div><h4 class="stats-heading">Lifetime Stats</h4>${getStatsPanelHTML()}<div class="separator"></div><p class="credits-text"><strong>Retro Snake Pixel Art Edition</strong></p><p class="credits-text" style="margin-top:5px;">Open source &#183; free to play, study, and build on</p><div class="separator"></div><div class="dedication">This whole game is yours. Fork it, remix it, tear it apart, and make something new &#8212; no permission or credit needed. It started as one small project and grew through a year of building with AI. If it helps you fall in love with creating things, that's the point.<span class="sig">&#8212; the Digital Spellcaster &#10024;</span></div>`;
            showGenericMessage("ABOUT SNAKE", aC, { isAbout: true, keepSettingsOpen: true });
        }
        
        function getIconHTML(iconType, size = 24) {
            const cachedIcon = iconCache[iconType];
            if (cachedIcon) {
                return `<img src="${cachedIcon}" alt="${iconType} icon" style="vertical-align:middle;margin-right:8px;width:${size}px;height:${size}px;image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;">`;
            }
            return `<span style="display:inline-block;width:${size}px;height:${size}px;border:1px dashed #555;vertical-align:middle;margin-right:8px;text-align:center;">?</span>`;
        }

        function preRenderHelpIcons() {
            const iconTypes = [ POWERUP_TYPE_GHOST, POWERUP_TYPE_STAR, POWERUP_TYPE_FOOD_MAGNET, POWERUP_TYPE_LENGTH_CUTTER, POWERUP_TYPE_COIN, OBSTACLE_TYPE_SPIKE_BLOCK, FOOD_TYPE_NORMAL ];
            const size = 24;
            const originalGameCtx = ctx;

            iconTypes.forEach(type => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext('2d');
                ctx = tempCtx;

                tempCtx.clearRect(0, 0, size, size);
                try {
                    const x = size / 2, y = size / 2;
                    if (type === POWERUP_TYPE_GHOST) drawGhostIcon(x, y, size);
                    else if (type === POWERUP_TYPE_STAR) drawStarIcon(x, y, size);
                    else if (type === POWERUP_TYPE_FOOD_MAGNET) drawMagnetIconV2(ctx, x, y, size);
                    else if (type === POWERUP_TYPE_LENGTH_CUTTER) drawLengthCutterIconV2(ctx, x, y, size);
                    else if (type === POWERUP_TYPE_COIN) drawCoinIcon(x, y, size);
                    else if (type === OBSTACLE_TYPE_SPIKE_BLOCK) drawShinySteelObstacle(ctx, 0, 0, size);
                    else if (type === FOOD_TYPE_NORMAL) drawNormalFoodIcon(x, y, size);
                    iconCache[type] = tempCanvas.toDataURL();
                } catch (e) { console.error(`Error pre-rendering icon for ${type}:`, e); }
            });
            ctx = originalGameCtx;
        }

        function preRenderActivePowerups() {
            activeIconCache = {};
            const iconTypes = [POWERUP_TYPE_GHOST, POWERUP_TYPE_STAR, POWERUP_TYPE_FOOD_MAGNET, POWERUP_TYPE_LENGTH_CUTTER, POWERUP_TYPE_COIN];
            const size = gridSize;
            const originalGameCtx = ctx;

            iconTypes.forEach(type => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext('2d');
                ctx = tempCtx;

                const originalDateNow = Date.now;
                Date.now = () => 0;
                try {
                    const x = size / 2, y = size / 2;

                    if (type === POWERUP_TYPE_GHOST) drawGhostIcon(x, y, size);
                    else if (type === POWERUP_TYPE_STAR) drawStarIcon(x, y, size);
                    else if (type === POWERUP_TYPE_FOOD_MAGNET) drawMagnetIconV2(ctx, x, y, size);
                    else if (type === POWERUP_TYPE_LENGTH_CUTTER) drawLengthCutterIconV2(ctx, x, y, size);
                    else if (type === POWERUP_TYPE_COIN) drawCoinIcon(x, y, size);
                    
                    activeIconCache[type] = tempCanvas;
                } catch (e) {
                    console.error(`Error pre-rendering active icon for ${type}:`, e);
                } finally {
                    Date.now = originalDateNow;
                }
            });

            ctx = originalGameCtx;
        }

        function showHelpMessage(){
            playSfx(sfxClick);
            const hC = `<div style="text-align:left;">
                <p><strong>Item Power-Ups & Collectibles:</strong></p>
                <ul style="list-style-type:none;padding-left:0;">
                    <li style="margin-bottom:10px;">${getIconHTML(POWERUP_TYPE_GHOST)}<strong>Ghost Mode:</strong> Pass through self & obstacles.</li>
                    <li style="margin-bottom:10px;">${getIconHTML(POWERUP_TYPE_STAR)}<strong>Star Power:</strong> Invincible! Eat obstacles for points.</li>
                    <li style="margin-bottom:10px;">${getIconHTML(POWERUP_TYPE_FOOD_MAGNET)}<strong>Food Magnet:</strong> Pulls items towards you.</li>
                    <li style="margin-bottom:10px;">${getIconHTML(POWERUP_TYPE_LENGTH_CUTTER)}<strong>Length Cutter:</strong> Shrinks snake by ${LENGTH_CUTTER_SEGMENTS_TO_REMOVE} segments.</li>
                </ul>
                <div class="separator"></div>
                <p><strong>Coin Collection:</strong></p>
                <ul style="list-style-type:none;padding-left:0;">
                    <li style="margin-bottom:10px;">${getIconHTML(POWERUP_TYPE_COIN)}<strong>Coins:</strong> Collect ${COIN_COLLECTION_GOAL} to trigger a reward: +${COIN_REWARD_BONUS_POINTS} points & gain Ghost/Magnet powers!</li>
                </ul>
                <div class="separator"></div>
                <p><strong>Unlock new items by eating NORMAL FOOD! Check "UNLOCKS & HI SCORES" in settings.</strong></p>
            </div>`;
            showGenericMessage("GAME HELP", hC, { isHelp: true, keepSettingsOpen: true });
        }
        function hideMessageBox(){ const vE=document.getElementById('version-number-text');if(vE){vE.removeEventListener('click',handleVersionTap);}messageBox.style.display='none';isMessageBoxVisible=false;}
        
        function showSettingsMenu(){
            if(isMessageBoxVisible) hideMessageBox();
            gameWasRunningBeforeMenu = isGameRunning;
            if(isGameRunning) isGameRunning = false;
            updateCycleDifficultyButtonUI();
            updateCyclePhoneColorButtonUI();
            updateCycleGameThemeButtonUI();
            updateCycleSnakeSkinButtonUI();
            updateCycleDPadStyleButtonUI();
            updateCycleGraphicsModeButtonUI();
            updateCycleFpsButtonUI();
            updateCycleScreenModeButtonUI();
            updateObstaclesButtonUI();
            updateWallsButtonUI();
            updateSwipeButtonUI();
            updateLargeFontsButtonUI();
            updateKeepThemeButtonUI();
            settingsMenu.style.display='flex';
            isSettingsMenuVisible=true;
            scaleSettingsMenuToGameScreen();
        }
        
        function hideSettingsAndPlay() {
            playSfx(sfxClick);
            settingsMenu.style.display = 'none';
            isSettingsMenuVisible = false;

            applySettings();
            if (gameWasRunningBeforeMenu && !isGameOver) {
                isGameRunning = true;
                isPaused = false;
                hidePauseOverlay();
                startRestartButton.innerHTML = PAUSE_ICON;
                lastFrameTime = performance.now();
            } else {
                startGame();
            }
        }
        
        function applySettings() {
            applyPhoneColorAndInfoText();
            applyDPadStyle();
            drawGameOnDemand();
        }

        function exitGame(){ try{if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.App){const{App}=window.Capacitor.Plugins;App.exitApp();}else{if(typeof window.close==='function'){window.close();if(!window.closed){showGenericMessage("Exit","<p>Could not close. Please close tab manually.</p>");}}else{showGenericMessage("Exit","<p>Please close tab manually.</p>");}}}catch(e){showGenericMessage("Error","<p>Error exiting.</p>");}}
        
        async function enterImmersiveMode() {
            try {
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BoengliCapacitorFullscreen) {
                    const { BoengliCapacitorFullscreen } = window.Capacitor.Plugins;
                    await BoengliCapacitorFullscreen.enter({ hideStatusBar: true, hideNavigationBar: true });
                }
            } catch (e) {
                console.error('Error entering immersive mode:', e);
            }
        }

        /* ============================================================
           SECTION: INPUT — direction queue & keyboard
           Buffered turns prevent 180-degree reversals; arrow/WASD keys here too.
           ============================================================ */
        function queueDirectionChange(newDx, newDy) {
            if (!isGameRunning || isGameOver || (newDx === 0 && newDy === 0)) return;
            if (inputQueue.length >= MAX_INPUT_QUEUE_LENGTH) return;
        
            const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx: dx, dy: dy };
            const isReverseHorizontal = lastMove.dx !== 0 && newDx === -lastMove.dx;
            const isReverseVertical = lastMove.dy !== 0 && newDy === -lastMove.dy;
            if (isReverseHorizontal || isReverseVertical) {
                return;
            }
            
            const direction = { dx: newDx, dy: newDy };
            inputQueue.push(direction);
        }
        
        function handleKeyPress(e){
            if (isSettingsMenuVisible || isMessageBoxVisible) return;
            const key = e.key.toLowerCase();
            if(key==='arrowup'||key==='w'){ queueDirectionChange(0, -1); } 
            else if(key==='arrowdown'||key==='s'){ queueDirectionChange(0, 1);
            }
            else if(key==='arrowleft'||key==='a'){ queueDirectionChange(-1, 0);
            } 
            else if(key==='arrowright'||key==='d'){ queueDirectionChange(1, 0);
            }
        }
        
        let sRActInProg=false;
        function showPauseOverlay() {
            const ov = document.getElementById('pause-overlay');
            if (ov) ov.classList.add('shown');
        }
        function hidePauseOverlay() {
            const ov = document.getElementById('pause-overlay');
            if (ov) ov.classList.remove('shown');
        }
        function pauseGame() {
            if (!isGameRunning || isGameOver || isPaused) return;
            isPaused = true;
            startRestartButton.innerHTML = START_ICON; // ▶ = resume
            showPauseOverlay();
            triggerHaptic('LIGHT');
        }
        function resumeGame() {
            if (!isPaused) return;
            isPaused = false;
            hidePauseOverlay();
            startRestartButton.innerHTML = PAUSE_ICON;
            // Reset timing so the snake doesn't lurch forward after the pause
            lastFrameTime = performance.now();
            lastRenderTime = lastFrameTime;
            gameUpdateAccumulator = 0;
            triggerHaptic('LIGHT');
        }

        function handleStartRestartClicked(){
            if(sRActInProg||isSettingsMenuVisible)return; sRActInProg=true;
            getAudioCtx(); // unlock/resume audio inside the user gesture so SFX can play on mobile
            if (isGameOver || !isGameRunning) {
                startGame();              // start fresh, or restart after game over
            } else if (isPaused) {
                resumeGame();             // currently paused -> resume
            } else {
                pauseGame();              // currently playing -> pause
            }
            setTimeout(()=>{sRActInProg=false;},100);
        }
        
        /* ============================================================
           SECTION: INPUT WIRING — D-pad, buttons, swipe
           Attaches all touch/click handlers, including swipe-to-steer.
           ============================================================ */
        function setupInputListeners() {
            document.addEventListener('keydown', handleKeyPress);
            startRestartButton.addEventListener('pointerdown', (e) => { e.stopPropagation(); handleStartRestartClicked(); });
            settingsIcon.addEventListener('pointerdown', (e) => { e.stopPropagation(); showSettingsMenu(); });
            const pauseOverlayEl = document.getElementById('pause-overlay');
            if (pauseOverlayEl) pauseOverlayEl.addEventListener('pointerdown', (e) => { e.stopPropagation(); resumeGame(); });
            
            const dpadButtons = [
                { element: upButton, dx: 0, dy: -1 },
                { element: downButton, dx: 0, dy: 1 },
                { element: leftButton, dx: -1, dy: 0 },
                { element: rightButton, dx: 1, dy: 0 }
            ];
            dpadButtons.forEach(buttonInfo => {
                buttonInfo.element.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    buttonInfo.element.classList.add('control-glow');
                    queueDirectionChange(buttonInfo.dx, buttonInfo.dy);
                }, { passive: false });

                const endTouch = (e) => {
                    e.preventDefault();
                    buttonInfo.element.classList.remove('control-glow');
                };

                buttonInfo.element.addEventListener('touchend', endTouch);
                buttonInfo.element.addEventListener('touchcancel', endTouch);
            });

            // --- Swipe controls (play area) ---
            // Passive listeners + acting on the first threshold crossing of touchmove
            // keeps this responsive and smooth (no scroll-blocking, no waiting for lift).
            let __swipeStartX = 0, __swipeStartY = 0, __swipeDone = true;
            const SWIPE_THRESHOLD = 24;
            const swipeTarget = document.querySelector('.screen-border') || canvas;
            if (swipeTarget) {
                swipeTarget.addEventListener('touchstart', (e) => {
                    if (!swipeEnabled) return;
                    const t = e.changedTouches[0];
                    __swipeStartX = t.clientX;
                    __swipeStartY = t.clientY;
                    __swipeDone = false;
                }, { passive: true });

                swipeTarget.addEventListener('touchmove', (e) => {
                    if (!swipeEnabled || __swipeDone) return;
                    const t = e.changedTouches[0];
                    const ddx = t.clientX - __swipeStartX;
                    const ddy = t.clientY - __swipeStartY;
                    if (Math.abs(ddx) < SWIPE_THRESHOLD && Math.abs(ddy) < SWIPE_THRESHOLD) return;
                    if (Math.abs(ddx) > Math.abs(ddy)) {
                        queueDirectionChange(ddx > 0 ? 1 : -1, 0);
                    } else {
                        queueDirectionChange(0, ddy > 0 ? 1 : -1);
                    }
                    __swipeDone = true; // one turn per swipe; reset on next touchstart
                }, { passive: true });
            }
        }

        /* ============================================================
           SECTION: BOOTSTRAP — runs once on load
           Wires every control, loads saved settings, draws the first frame.
           ============================================================ */
        window.onload=()=>{
            setCanvasSize();
            loadUnlockProgress();
            
            const isFirstRun = localStorage.getItem('isFirstRun') === null;
            if (isFirstRun) {
                localStorage.setItem('isFirstRun', 'false');
                currentDifficultyIndex = difficultyLevels.indexOf('normal');
                currentGraphicsModeIndex = graphicsModes.findIndex(mode => mode.name === 'ULTRA');
                currentFpsLimitIndex = fpsLimits.findIndex(fps => fps.value === 60);
                currentPhoneColorIndex = phoneColors.findIndex(color => color.name === 'Charcoal');
                currentDPadStyleIndex = dPadStyles.findIndex(style => style.name === 'ANODIZED');
                obstaclesEnabled = false;

                saveDifficulty();
                saveGraphicsMode();
                saveFpsLimit();
                savePhoneColor();
                saveDPadStyle();
                saveObstacleMode();
            }

            loadDifficulty();
            loadScreenMode();
            loadPhoneColor();
            loadGameTheme();
            loadSnakeSkin();
            loadDPadStyle();
            loadGraphicsMode();
            loadFpsLimit();
            loadObstaclesEnabledSetting(); loadObstacleMode();
            loadAudioHapticsSettings();
            loadWallsSetting();
            loadSwipeSetting();
            loadLargeFontsSetting();
            loadKeepThemeSetting();
            loadAdvancedState();
            loadLifetimeStats();
            preRenderHelpIcons();
            preRenderActivePowerups();
            
            setupInputListeners();
            toggleSoundsButton.addEventListener('click', toggleSounds);
            toggleHapticsButton.addEventListener('click', toggleHaptics);
            saveAndPlayButton.addEventListener('click', hideSettingsAndPlay);
            menuUnlocksHighScoresButton.addEventListener('click', showUnlocksAndHighScoresMessage);
            menuAboutButton.addEventListener('click', showAboutInfo);
            menuHelpButton.addEventListener('click', showHelpMessage);
            menuExitGameButton.addEventListener('click', exitGame);
            cycleDifficultyButton.addEventListener('click', cycleDifficulty);
            cycleScreenModeButton.addEventListener('click', cycleScreenMode);
            cycleGameThemeButton.addEventListener('click', cycleGameTheme);
            cyclePhoneColorButton.addEventListener('click', cyclePhoneColor);
            cycleSnakeSkinButton.addEventListener('click', cycleSnakeSkin);
            cycleDPadStyleButton.addEventListener('click', cycleDPadStyle);
            cycleGraphicsModeButton.addEventListener('click', cycleGraphicsMode);
            cycleFpsLimitButton.addEventListener('click', cycleFpsLimit);
            toggleObstaclesButton.addEventListener('click', toggleObstacles);
            toggleWallsButton.addEventListener('click', toggleWalls);
            toggleSwipeButton.addEventListener('click', toggleSwipe);
            toggleLargeFontsButton.addEventListener('click', toggleLargeFonts);
            toggleKeepThemeButton.addEventListener('click', toggleKeepTheme);
            if (advancedToggle) advancedToggle.addEventListener('click', toggleAdvanced);

            initGame();
            lockScreenOrientation();
            scaleGameToFitScreen();
            resizeCanvasForDPR();
            enterImmersiveMode();
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
                const { App } = window.Capacitor.Plugins;
                App.addListener('resume', () => { enterImmersiveMode(); });
            }

            if (isFirstRun) {
                showGenericMessage('Welcome', '<p style="color:#f0c040; font-size:15px; line-height:1.6; text-align:center;">An open-source arcade game &#8212; free to play, and free to build on. Made across a year of learning to code with AI, and now it\'s yours to enjoy and remix.</p>');
                const firstOk = document.getElementById('message-box-ok');
                if (firstOk) {
                    firstOk.onclick = () => {
                        showGenericMessage('How to Play', '<p style="font-size:15px; line-height:1.6; text-align:center;">Swipe across the screen or tap the arrow buttons to steer the snake. Eat the food to grow longer. That\'s it &#8212; have fun!</p>');
                    };
                }
            }
        };
        window.addEventListener('resize',()=>{
            scaleGameToFitScreen();
            resizeCanvasForDPR();
        });
    </script>

<script>
// Reduced Motion: runtime flag bound to OS setting
(function(){
  try {
    const mq = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)');
    window.__reduceMotion = !!(mq && mq.matches);
    if (mq) {
      if (mq.addEventListener) mq.addEventListener('change', e => { window.__reduceMotion = !!e.matches; if (typeof drawGameOnDemand==='function') drawGameOnDemand(); });
      else if (mq.addListener) mq.addListener(e => { window.__reduceMotion = !!e.matches; if (typeof drawGameOnDemand==='function') drawGameOnDemand(); });
    }
  } catch(e) { window.__reduceMotion = false; }
})();
</script>


<script>
document.addEventListener('visibilitychange', () => {
  try {
    if (document.hidden) {
      window.__wasRunningBeforeHide = (typeof isGameRunning !== 'undefined') ? !!isGameRunning : false;
      if (typeof isGameRunning !== 'undefined') isGameRunning = false;
    } else {
      const menuOpen = (typeof isSettingsMenuVisible !== 'undefined') && isSettingsMenuVisible;
      const msgOpen  = (typeof isMessageBoxVisible !== 'undefined') && isMessageBoxVisible;
      const isOver   = (typeof isGameOver !== 'undefined') && isGameOver;
      if (window.__wasRunningBeforeHide && !menuOpen && !msgOpen && !isOver) {
        if (typeof isGameRunning !== 'undefined') isGameRunning = true;
        if (typeof performance !== 'undefined' && typeof lastFrameTime !== 'undefined') { lastFrameTime = performance.now(); }
      }
    }
  } catch(e) {}
}, { passive: true });
</script>



    
<script id="loadObstacleMode-patch">
    // --- Patch: define tri-state obstacle loader used by onload ---
    function loadObstacleMode(){
      try {
        var storedMode = localStorage.getItem(OBSTACLES_MODE_STORAGE_KEY);
        if (storedMode === null) {
          // Back-compat with old boolean
          var oldEnabled = localStorage.getItem(OBSTACLES_ENABLED_STORAGE_KEY);
          obstaclesEnabled = (oldEnabled === 'true');
          obstaclesMode = obstaclesEnabled ? OBSTACLE_MODE_CLASSIC : OBSTACLE_MODE_OFF;
        } else {
          var parsed = parseInt(storedMode, 10);
          if (parsed === OBSTACLE_MODE_CLASSIC || parsed === OBSTACLE_MODE_EXTREME) {
            obstaclesMode = parsed;
          } else {
            obstaclesMode = OBSTACLE_MODE_OFF;
          }
          obstaclesEnabled = (obstaclesMode !== OBSTACLE_MODE_OFF);
        }
      } catch (e) {
        obstaclesEnabled = false;
        obstaclesMode = OBSTACLE_MODE_OFF;
      }
      if (typeof updateObstaclesButtonUI === 'function') { updateObstaclesButtonUI(); }
    }
    </script>
